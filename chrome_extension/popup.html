<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 220px;
        padding: 12px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      button {
        width: 100%;
        margin: 6px 0;
        padding: 8px;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #f7f7f7;
      }
      button:hover {
        background: #eee;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>TabGroupManager</h1>
    <button id="capture">保存当前标签组到 App</button>
    <div id="status">等待操作…</div>
    <script src="popup.js"></script>
  </body>
</html>
